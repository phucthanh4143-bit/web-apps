<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Shoutbox | Chat với cảm xúc + Refresh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    /* Toolbar - Nút Refresh */
    .toolbar {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover {
      background: #5a67d8;
      transform: scale(0.98);
    }

    .refresh-btn:active {
      transform: rotate(180deg);
      transition: 0.3s;
    }

    .auto-refresh-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #10b981;
    }

    .status-dot.refreshing {
      background: #f59e0b;
      animation: none;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Online stats */
    .online-stats {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    /* Message Form */
    .message-form {
      background: white;
      padding: 1.5rem;
      border-radius: 20px;
      margin-bottom: 2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #475569;
    }

    input, select, button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 0.9rem;
    }

    button {
      background: #667eea;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    /* Messages Grid */
    .messages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
      max-height: 500px;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .message-card {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      transition: 0.2s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
    }

    .avatar {
      font-size: 2rem;
    }

    .user-info {
      flex: 1;
    }

    .username {
      font-weight: bold;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .timestamp {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .emotion {
      font-size: 1.5rem;
    }

    .message-content {
      color: #334155;
      line-height: 1.5;
      word-wrap: break-word;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      background: white;
      padding: 1rem;
      border-radius: 20px;
    }

    .pagination button {
      padding: 8px 16px;
      background: #e2e8f0;
      color: #1e293b;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-info {
      font-weight: bold;
      color: #1e293b;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
    }

    /* Toast thông báo */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
      animation: slideInRight 0.3s ease;
      display: none;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .messages-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-comments"></i> Realtime Shoutbox</h1>
    <div class="sub">Chat ngay | Cảm xúc thật | Realtime + Tự động làm mới</div>
  </div>

  <!-- Toolbar với nút Refresh -->
  <div class="toolbar">
    <button id="refreshBtn" class="refresh-btn">
      <i class="fas fa-sync-alt"></i> Làm mới tin nhắn
    </button>
    <div class="auto-refresh-status">
      <div class="status-dot active" id="autoRefreshDot"></div>
      <span id="autoRefreshText">🔄 Tự động làm mới mỗi 30 giây</span>
    </div>
  </div>

  <div class="online-stats">
    <div class="stat-item">
      <div class="status-dot active"></div>
      <span><strong id="onlineCount">0</strong> người đang online</span>
    </div>
    <div class="stat-item">
      <i class="fas fa-comment"></i>
      <span>Tổng số tin nhắn: <strong id="totalMessages">0</strong></span>
    </div>
    <div class="stat-item">
      <i class="fas fa-trash-alt"></i>
      <span>Tự động xóa sau 24h</span>
    </div>
  </div>

  <!-- Form gửi tin nhắn -->
  <div class="message-form">
    <div class="form-row">
      <div class="form-group" style="min-width: 150px">
        <label><i class="fas fa-user"></i> Tên của bạn</label>
        <input type="text" id="username" placeholder="Nhập tên...">
      </div>
      <div class="form-group" style="flex: 2">
        <label><i class="fas fa-comment"></i> Tin nhắn</label>
        <input type="text" id="message" placeholder="Nhập tin nhắn..." autocomplete="off">
      </div>
      <div class="form-group">
        <label><i class="fas fa-smile"></i> Cảm xúc</label>
        <select id="emotion">
          <option>😊</option>
          <option>😂</option>
          <option>😍</option>
          <option>😢</option>
          <option>😡</option>
          <option>🎉</option>
          <option>👍</option>
        </select>
      </div>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i> Gửi</button>
    </div>
  </div>

  <!-- Grid hiển thị tin nhắn -->
  <div id="messagesGrid" class="messages-grid">Đang tải tin nhắn...</div>

  <!-- Phân trang -->
  <div class="pagination" id="pagination">
    <button id="prevPage" disabled><i class="fas fa-chevron-left"></i> Trước</button>
    <span class="page-info">Trang <span id="currentPage">1</span> / <span id="totalPages">1</span></span>
    <button id="nextPage">Sau <i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<!-- Toast thông báo -->
<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i> <span id="toastMessage">Đã làm mới</span>
</div>

<script>
(function() {
  // ===== CẤU HÌNH SUPABASE =====
  const MY_URL = 'https://ulsaoohiyyfwntytxout.supabase.co';
  const MY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsc2Fvb2hpeXlmd250eXR4b3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODY4MjUsImV4cCI6MjA5Njg2MjgyNX0.pK66OodAYG4YTk6kUox6IWtqL4c1bHagNs6aMnjQunc';
  
  const _supabase = window.supabase.createClient(MY_URL, MY_KEY);
  const TABLE_NAME = 'shoutbox';
  
  // State
  let messages = [];
  let currentPage = 1;
  const messagesPerPage = 6;
  let totalMessages = 0;
  let onlineUsers = new Set();
  
  // Auto refresh
  let autoRefreshInterval = null;
  let isRefreshing = false;
  
  // DOM
  const messagesGrid = document.getElementById('messagesGrid');
  const usernameInput = document.getElementById('username');
  const messageInput = document.getElementById('message');
  const emotionSelect = document.getElementById('emotion');
  const sendBtn = document.getElementById('sendBtn');
  const prevPageBtn = document.getElementById('prevPage');
  const nextPageBtn = document.getElementById('nextPage');
  const currentPageSpan = document.getElementById('currentPage');
  const totalPagesSpan = document.getElementById('totalPages');
  const totalMessagesSpan = document.getElementById('totalMessages');
  const onlineCountSpan = document.getElementById('onlineCount');
  const refreshBtn = document.getElementById('refreshBtn');
  const autoRefreshDot = document.getElementById('autoRefreshDot');
  const autoRefreshText = document.getElementById('autoRefreshText');
  const toast = document.getElementById('toast');
  const toastMessage = document.getElementById('toastMessage');
  
  // Hiển thị thông báo
  function showToast(msg, isError = false) {
    toastMessage.innerHTML = msg;
    toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 2000);
  }
  
  // Helper functions
  function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'Vừa xong';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
    return date.toLocaleDateString('vi-VN');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
  // Hiệu ứng refresh trên nút
  function animateRefreshButton() {
    const icon = refreshBtn.querySelector('i');
    icon.style.transform = 'rotate(180deg)';
    icon.style.transition = '0.3s';
    setTimeout(() => {
      icon.style.transform = 'rotate(0deg)';
    }, 300);
  }
  
  // Load messages với phân trang (có thể force refresh)
  async function loadMessages(showLoading = true, isManualRefresh = false) {
    if (isManualRefresh) {
      isRefreshing = true;
      refreshBtn.disabled = true;
      animateRefreshButton();
    }
    
    if (showLoading && !isRefreshing) {
      messagesGrid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Đang tải...</div>';
    }
    
    // Tính offset
    const start = (currentPage - 1) * messagesPerPage;
    
    // Lấy tổng số tin nhắn
    const { count, error: countError } = await _supabase
      .from(TABLE_NAME)
      .select('*', { count: 'exact', head: true });
    
    if (countError) {
      console.error('Lỗi đếm:', countError);
    } else {
      totalMessages = count || 0;
      totalMessagesSpan.textContent = totalMessages;
      const totalPages = Math.ceil(totalMessages / messagesPerPage);
      totalPagesSpan.textContent = totalPages || 1;
    }
    
    // Lấy tin nhắn theo trang
    const { data, error } = await _supabase
      .from(TABLE_NAME)
      .select('*')
      .order('created_at', { ascending: false })
      .range(start, start + messagesPerPage - 1);
    
    if (error) {
      messagesGrid.innerHTML = `<div class="loading">⚠️ Lỗi: ${error.message}</div>`;
      if (isManualRefresh) showToast('Lỗi khi làm mới: ' + error.message, true);
      return;
    }
    
    messages = data || [];
    renderMessages();
    updatePaginationButtons();
    
    if (isManualRefresh) {
      showToast('✅ Đã làm mới tin nhắn thành công!');
      setTimeout(() => {
        isRefreshing = false;
        refreshBtn.disabled = false;
      }, 500);
    }
  }
  
  // Tự động làm mới ngầm (không ảnh hưởng UI)
  async function silentRefresh() {
    if (isRefreshing) return;
    
    // Đổi màu dot thành vàng để báo hiệu đang refresh
    autoRefreshDot.classList.remove('active');
    autoRefreshDot.classList.add('refreshing');
    autoRefreshText.innerHTML = '🔄 Đang làm mới dữ liệu...';
    
    try {
      const start = (currentPage - 1) * messagesPerPage;
      
      const { count } = await _supabase
        .from(TABLE_NAME)
        .select('*', { count: 'exact', head: true });
      
      const { data, error } = await _supabase
        .from(TABLE_NAME)
        .select('*')
        .order('created_at', { ascending: false })
        .range(start, start + messagesPerPage - 1);
      
      if (!error && data) {
        const hasNewMessages = JSON.stringify(messages) !== JSON.stringify(data);
        messages = data;
        totalMessages = count || 0;
        totalMessagesSpan.textContent = totalMessages;
        const totalPages = Math.ceil(totalMessages / messagesPerPage);
        totalPagesSpan.textContent = totalPages || 1;
        renderMessages();
        updatePaginationButtons();
        
        if (hasNewMessages) {
          // Chỉ hiện thông báo nhẹ khi có tin mới
          autoRefreshText.innerHTML = '🔄 Có tin nhắn mới! Đã cập nhật';
          setTimeout(() => {
            autoRefreshText.innerHTML = '🔄 Tự động làm mới mỗi 30 giây';
          }, 2000);
        } else {
          autoRefreshText.innerHTML = '🔄 Tự động làm mới mỗi 30 giây';
        }
      }
    } catch (err) {
      console.error('Silent refresh error:', err);
      autoRefreshText.innerHTML = '⚠️ Lỗi kết nối, sẽ thử lại sau';
    } finally {
      autoRefreshDot.classList.remove('refreshing');
      autoRefreshDot.classList.add('active');
      setTimeout(() => {
        if (autoRefreshText.innerHTML.includes('Lỗi')) {
          autoRefreshText.innerHTML = '🔄 Tự động làm mới mỗi 30 giây';
        }
      }, 3000);
    }
  }
  
  function renderMessages() {
    if (messages.length === 0) {
      messagesGrid.innerHTML = '<div class="loading">✨ Chưa có tin nhắn nào. Hãy là người đầu tiên!</div>';
      return;
    }
    
    messagesGrid.innerHTML = messages.map(msg => `
      <div class="message-card">
        <div class="message-header">
          <div class="avatar">${escapeHtml(msg.user_avatar || '👤')}</div>
          <div class="user-info">
            <div class="username">
              <strong>${escapeHtml(msg.username)}</strong>
              <span class="emotion">${msg.emotion || '😊'}</span>
            </div>
            <div class="timestamp">
              <i class="far fa-clock"></i> ${formatTime(msg.created_at)}
            </div>
          </div>
        </div>
        <div class="message-content">
          ${escapeHtml(msg.message)}
        </div>
      </div>
    `).join('');
    
    messagesGrid.scrollTop = 0;
  }
  
  function updatePaginationButtons() {
    const totalPages = Math.ceil(totalMessages / messagesPerPage);
    currentPageSpan.textContent = currentPage;
    
    prevPageBtn.disabled = currentPage === 1;
    nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;
  }
  
  // Gửi tin nhắn mới
  async function sendMessage() {
    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();
    const emotion = emotionSelect.value;
    
    if (!username) {
      alert('Vui lòng nhập tên của bạn');
      return;
    }
    
    if (!message) {
      alert('Vui lòng nhập tin nhắn');
      return;
    }
    
    const avatars = ['😀', '😎', '🥳', '🤩', '👨‍💻', '👩‍🎨', '🦸', '🐱', '🐶', '🦄'];
    const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
    
    const newMessage = {
      username: username,
      message: message,
      emotion: emotion,
      user_avatar: randomAvatar
    };
    
    const { error } = await _supabase
      .from(TABLE_NAME)
      .insert([newMessage]);
    
    if (error) {
      alert('Gửi tin nhắn thất bại: ' + error.message);
      return;
    }
    
    messageInput.value = '';
    messageInput.focus();
    
    if (currentPage !== 1) {
      currentPage = 1;
      await loadMessages(true, false);
    }
  }
  
  // Realtime subscription
  function setupRealtime() {
    const channel = _supabase
      .channel('shoutbox-realtime')
      .on('postgres_changes', 
        { event: 'INSERT', schema: 'public', table: TABLE_NAME },
        async (payload) => {
          console.log('🔄 Tin nhắn mới:', payload.new);
          showToast(`💬 ${payload.new.username} vừa gửi tin nhắn!`);
          await loadMessages(true, false);
        }
      )
      .on('postgres_changes',
        { event: 'DELETE', schema: 'public', table: TABLE_NAME },
        async () => {
          console.log('🗑️ Có tin nhắn bị xóa');
          await loadMessages(true, false);
        }
      )
      .subscribe();
    
    return channel;
  }
  
  // Khởi động auto refresh ngầm
  function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
      silentRefresh();
    }, 30000); // 30 giây
    console.log('✅ Auto refresh đã khởi động (30s)');
  }
  
  function stopAutoRefresh() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
      console.log('⏸️ Auto refresh đã dừng');
    }
  }
  
  // Online users simulation
  let heartbeatInterval;
  function startHeartbeat() {
    heartbeatInterval = setInterval(() => {
      const online = Math.floor(Math.random() * 20) + 5;
      onlineCountSpan.textContent = online;
    }, 5000);
  }
  
  // Pagination handlers
  function nextPage() {
    const totalPages = Math.ceil(totalMessages / messagesPerPage);
    if (currentPage < totalPages) {
      currentPage++;
      loadMessages(true, false);
    }
  }
  
  function prevPage() {
    if (currentPage > 1) {
      currentPage--;
      loadMessages(true, false);
    }
  }
  
  // Event listeners
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      sendMessage();
    }
  });
  
  refreshBtn.addEventListener('click', () => {
    loadMessages(true, true);
  });
  
  sendBtn.addEventListener('click', sendMessage);
  prevPageBtn.addEventListener('click', prevPage);
  nextPageBtn.addEventListener('click', nextPage);
  
  // Set random username if empty
  if (!usernameInput.value) {
    const randomNum = Math.floor(Math.random() * 1000);
    usernameInput.value = `Khách_${randomNum}`;
  }
  
  // Request notification permission
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
  
  // Initialize
  async function init() {
    await loadMessages(true, false);
    setupRealtime();
    startAutoRefresh(); // Khởi động auto refresh ngầm
    startHeartbeat();
    
    // Auto refresh timestamp mỗi phút
    setInterval(() => {
      renderMessages();
    }, 60000);
  }
  
  // Dọn dẹp khi đóng trang
  window.addEventListener('beforeunload', () => {
    stopAutoRefresh();
  });
  
  init();
})();
</script>
</body>
</html>
