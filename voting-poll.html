<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Voting Poll | Biểu quyết + Refresh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    /* Toolbar */
    .toolbar {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover {
      background: #5a67d8;
      transform: scale(0.98);
    }

    .refresh-btn:active i {
      transform: rotate(180deg);
      transition: 0.3s;
    }

    .auto-refresh-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #10b981;
    }

    .status-dot.refreshing {
      background: #f59e0b;
      animation: none;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      padding: 1.2rem;
      border-radius: 16px;
      text-align: center;
    }

    .stat-card i {
      font-size: 1.5rem;
      color: #667eea;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 0.3rem;
    }

    /* Create Poll Form */
    .create-poll {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .create-poll h3 {
      margin-bottom: 1rem;
      color: #1e293b;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #475569;
    }

    input, textarea, button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 0.9rem;
      width: 100%;
    }

    .options-input {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .options-input input {
      flex: 1;
    }

    .add-option-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      width: auto;
    }

    button {
      background: #667eea;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    /* Polls Grid */
    .polls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
      gap: 1.5rem;
    }

    .poll-card {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      transition: 0.2s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .poll-header {
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e2e8f0;
    }

    .poll-question {
      font-size: 1.2rem;
      font-weight: bold;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    .poll-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .options-list {
      margin: 1rem 0;
    }

    .option-item {
      margin-bottom: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .option-item:hover {
      transform: translateX(5px);
    }

    .option-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
    }

    .progress-bar {
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      height: 30px;
      position: relative;
    }

    .progress-fill {
      background: linear-gradient(90deg, #667eea, #764ba2);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      transition: width 0.5s ease;
    }

    .poll-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .total-votes {
      font-size: 0.8rem;
      color: #64748b;
    }

    .delete-poll {
      background: #ef4444;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .poll-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .status-active {
      background: #d1fae5;
      color: #065f46;
    }

    .status-expired {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
      animation: slideInRight 0.3s ease;
      display: none;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      .polls-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-chart-simple"></i> Realtime Voting Poll</h1>
    <p>Tạo poll | Bỏ phiếu realtime | Kết quả trực quan + Refresh</p>
  </div>

  <!-- Toolbar với nút Refresh -->
  <div class="toolbar">
    <button id="refreshBtn" class="refresh-btn">
      <i class="fas fa-sync-alt"></i> Làm mới dữ liệu
    </button>
    <div class="auto-refresh-status">
      <div class="status-dot active" id="autoRefreshDot"></div>
      <span id="autoRefreshText">🔄 Tự động làm mới mỗi 30 giây</span>
    </div>
  </div>

  <!-- Thống kê nhanh -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-poll"></i>
      <div class="stat-value" id="totalPolls">0</div>
      <div>Tổng số Poll</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-vote-yea"></i>
      <div class="stat-value" id="totalVotesAll">0</div>
      <div>Tổng số phiếu</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-clock"></i>
      <div class="stat-value" id="lastUpdate">--:--:--</div>
      <div>Cập nhật lần cuối</div>
    </div>
  </div>

  <!-- Form tạo poll mới -->
  <div class="create-poll">
    <h3><i class="fas fa-plus-circle"></i> Tạo Poll mới</h3>
    <div class="form-group">
      <label><i class="fas fa-question-circle"></i> Câu hỏi</label>
      <input type="text" id="question" placeholder="VD: Bạn thích mùa nào nhất?">
    </div>
    <div class="form-group">
      <label><i class="fas fa-list"></i> Các lựa chọn</label>
      <div id="optionsContainer">
        <div class="options-input">
          <input type="text" class="option-input" placeholder="Lựa chọn 1">
          <input type="text" class="option-input" placeholder="Lựa chọn 2">
        </div>
      </div>
      <button type="button" id="addOptionBtn" class="add-option-btn" style="margin-top: 0.5rem;">
        <i class="fas fa-plus"></i> Thêm lựa chọn
      </button>
    </div>
    <div class="form-group">
      <label><i class="fas fa-user"></i> Tạo bởi</label>
      <input type="text" id="createdBy" placeholder="Tên của bạn" value="Anonymous">
    </div>
    <button id="createPollBtn"><i class="fas fa-rocket"></i> Tạo Poll</button>
  </div>

  <!-- Grid hiển thị các poll -->
  <div id="pollsGrid" class="polls-grid">Đang tải...</div>
</div>

<!-- Toast thông báo -->
<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i> <span id="toastMessage">Đã làm mới</span>
</div>

<script>
(function() {
  // ===== CẤU HÌNH SUPABASE =====
  const MY_URL = 'https://ulsaoohiyyfwntytxout.supabase.co';
  const MY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsc2Fvb2hpeXlmd250eXR4b3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODY4MjUsImV4cCI6MjA5Njg2MjgyNX0.pK66OodAYG4YTk6kUox6IWtqL4c1bHagNs6aMnjQunc';
  
  const _supabase = window.supabase.createClient(MY_URL, MY_KEY);
  
  // State
  let polls = [];
  let userVoted = new Map();
  let isRefreshing = false;
  let autoRefreshInterval = null;
  
  // DOM
  const pollsGrid = document.getElementById('pollsGrid');
  const questionInput = document.getElementById('question');
  const createdByInput = document.getElementById('createdBy');
  const createBtn = document.getElementById('createPollBtn');
  const addOptionBtn = document.getElementById('addOptionBtn');
  const optionsContainer = document.getElementById('optionsContainer');
  const refreshBtn = document.getElementById('refreshBtn');
  const autoRefreshDot = document.getElementById('autoRefreshDot');
  const autoRefreshText = document.getElementById('autoRefreshText');
  const totalPollsSpan = document.getElementById('totalPolls');
  const totalVotesAllSpan = document.getElementById('totalVotesAll');
  const lastUpdateSpan = document.getElementById('lastUpdate');
  const toast = document.getElementById('toast');
  const toastMessage = document.getElementById('toastMessage');
  
  // Helper
  function showToast(msg, isError = false) {
    toastMessage.innerHTML = msg;
    toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 2000);
  }
  
  function updateLastUpdateTime() {
    const now = new Date();
    lastUpdateSpan.textContent = now.toLocaleTimeString('vi-VN');
  }
  
  function animateRefreshButton() {
    const icon = refreshBtn.querySelector('i');
    icon.style.transform = 'rotate(180deg)';
    icon.style.transition = '0.3s';
    setTimeout(() => {
      icon.style.transform = 'rotate(0deg)';
    }, 300);
  }
  
  function getUserId() {
    let userId = localStorage.getItem('voter_id');
    if (!userId) {
      userId = 'user_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('voter_id', userId);
    }
    return userId;
  }
  
  const currentUserId = getUserId();
  
  // Load polls
  async function loadPolls(showLoading = true, isManualRefresh = false) {
    if (isManualRefresh) {
      isRefreshing = true;
      refreshBtn.disabled = true;
      animateRefreshButton();
    }
    
    if (showLoading && !isRefreshing) {
      pollsGrid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Đang tải polls...</div>';
    }
    
    const { data, error } = await _supabase
      .from('polls')
      .select('*')
      .order('created_at', { ascending: false });
    
    if (error) {
      pollsGrid.innerHTML = `<div class="loading">⚠️ Lỗi: ${error.message}</div>`;
      if (isManualRefresh) showToast('Lỗi khi làm mới: ' + error.message, true);
      return;
    }
    
    polls = data || [];
    
    // Cập nhật thống kê
    totalPollsSpan.textContent = polls.length;
    const totalVotes = polls.reduce((sum, p) => sum + (p.total_votes || 0), 0);
    totalVotesAllSpan.textContent = totalVotes;
    updateLastUpdateTime();
    
    // Kiểm tra user đã vote chưa
    for (let poll of polls) {
      const { data: voteData } = await _supabase
        .from('votes')
        .select('id')
        .eq('poll_id', poll.id)
        .eq('user_id', currentUserId)
        .single();
      
      userVoted.set(poll.id, !!voteData);
    }
    
    renderPolls();
    
    if (isManualRefresh) {
      showToast('✅ Đã làm mới dữ liệu thành công!');
      setTimeout(() => {
        isRefreshing = false;
        refreshBtn.disabled = false;
      }, 500);
    }
  }
  
  // Silent refresh (ngầm, không ảnh hưởng UI)
  async function silentRefresh() {
    if (isRefreshing) return;
    
    autoRefreshDot.classList.remove('active');
    autoRefreshDot.classList.add('refreshing');
    autoRefreshText.innerHTML = '🔄 Đang làm mới dữ liệu...';
    
    try {
      const { data, error } = await _supabase
        .from('polls')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (!error && data) {
        const hasChanges = JSON.stringify(polls) !== JSON.stringify(data);
        polls = data || [];
        
        // Cập nhật thống kê
        totalPollsSpan.textContent = polls.length;
        const totalVotes = polls.reduce((sum, p) => sum + (p.total_votes || 0), 0);
        totalVotesAllSpan.textContent = totalVotes;
        updateLastUpdateTime();
        
        for (let poll of polls) {
          const { data: voteData } = await _supabase
            .from('votes')
            .select('id')
            .eq('poll_id', poll.id)
            .eq('user_id', currentUserId)
            .single();
          userVoted.set(poll.id, !!voteData);
        }
        
        renderPolls();
        
        if (hasChanges) {
          autoRefreshText.innerHTML = '🔄 Có phiếu bầu mới! Đã cập nhật';
          setTimeout(() => {
            autoRefreshText.innerHTML = '🔄 Tự động làm mới mỗi 30 giây';
          }, 2000);
        } else {
          autoRefreshText.innerHTML = '🔄 Tự động làm mới mỗi 30 giây';
        }
      }
    } catch (err) {
      console.error('Silent refresh error:', err);
    } finally {
      autoRefreshDot.classList.remove('refreshing');
      autoRefreshDot.classList.add('active');
    }
  }
  
  function renderPolls() {
    if (polls.length === 0) {
      pollsGrid.innerHTML = '<div class="loading">✨ Chưa có poll nào. Hãy tạo poll đầu tiên!</div>';
      return;
    }
    
    pollsGrid.innerHTML = polls.map(poll => {
      const options = poll.options || [];
      const votes = poll.votes || {};
      const totalVotes = poll.total_votes || 0;
      const isExpired = new Date(poll.expires_at) < new Date();
      const isActive = poll.is_active && !isExpired;
      const hasVoted = userVoted.get(poll.id) || false;
      
      return `
        <div class="poll-card" data-poll-id="${poll.id}">
          <div class="poll-header">
            <div class="poll-question">${escapeHtml(poll.question)}</div>
            <div class="poll-meta">
              <span><i class="fas fa-user"></i> ${escapeHtml(poll.created_by)}</span>
              <span class="poll-status ${isActive ? 'status-active' : 'status-expired'}">
                ${isActive ? 'Đang mở' : 'Đã đóng'}
              </span>
            </div>
          </div>
          
          <div class="options-list">
            ${options.map((option, idx) => {
              const voteCount = votes[`option_${idx}`] || 0;
              const percentage = totalVotes > 0 ? (voteCount / totalVotes * 100).toFixed(1) : 0;
              
              return `
                <div class="option-item" onclick="window.voteForPoll('${poll.id}', ${idx})">
                  <div class="option-label">
                    <span>${escapeHtml(option)}</span>
                    <span>${voteCount} phiếu (${percentage}%)</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percentage}%">
                      ${percentage > 15 ? percentage + '%' : ''}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          
          <div class="poll-footer">
            <div class="total-votes">
              <i class="fas fa-users"></i> Tổng: ${totalVotes} phiếu
            </div>
            ${hasVoted ? '<span style="color:#10b981; font-size:0.8rem;"><i class="fas fa-check-circle"></i> Đã vote</span>' : ''}
            <button class="delete-poll" onclick="window.deletePoll('${poll.id}')">
              <i class="fas fa-trash"></i> Xóa
            </button>
          </div>
        </div>
      `;
    }).join('');
  }
  
  // Vote
  window.voteForPoll = async function(pollId, optionIndex) {
    if (userVoted.get(pollId)) {
      showToast('Bạn đã vote cho poll này rồi!', true);
      return;
    }
    
    const poll = polls.find(p => p.id === pollId);
    if (!poll) return;
    
    const isExpired = new Date(poll.expires_at) < new Date();
    if (!poll.is_active || isExpired) {
      showToast('Poll này đã đóng, không thể vote!', true);
      return;
    }
    
    const { error } = await _supabase
      .from('votes')
      .insert([{
        poll_id: pollId,
        user_id: currentUserId,
        option_index: optionIndex
      }]);
    
    if (error) {
      if (error.code === '23505') {
        showToast('Bạn đã vote cho poll này rồi!', true);
        userVoted.set(pollId, true);
      } else {
        showToast('Lỗi khi vote: ' + error.message, true);
      }
      return;
    }
    
    userVoted.set(pollId, true);
    showToast('✅ Đã ghi nhận phiếu bầu của bạn!');
    await loadPolls(true, false);
  };
  
  // Delete poll
  window.deletePoll = async function(pollId) {
    if (confirm('Bạn có chắc muốn xóa poll này không?')) {
      const { error } = await _supabase
        .from('polls')
        .delete()
        .eq('id', pollId);
      
      if (error) {
        showToast('Xóa thất bại: ' + error.message, true);
      } else {
        showToast('✅ Đã xóa poll thành công');
        await loadPolls(true, false);
      }
    }
  };
  
  // Create poll
  async function createPoll() {
    const question = questionInput.value.trim();
    const createdBy = createdByInput.value.trim() || 'Anonymous';
    
    if (!question) {
      showToast('Vui lòng nhập câu hỏi', true);
      return;
    }
    
    const optionInputs = document.querySelectorAll('.option-input');
    const options = Array.from(optionInputs)
      .map(input => input.value.trim())
      .filter(opt => opt !== '');
    
    if (options.length < 2) {
      showToast('Vui lòng nhập ít nhất 2 lựa chọn', true);
      return;
    }
    
    const initialVotes = {};
    options.forEach((_, idx) => {
      initialVotes[`option_${idx}`] = 0;
    });
    
    const { error } = await _supabase
      .from('polls')
      .insert([{
        question: question,
        options: options,
        votes: initialVotes,
        total_votes: 0,
        created_by: createdBy,
        expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
      }]);
    
    if (error) {
      showToast('Tạo poll thất bại: ' + error.message, true);
      return;
    }
    
    questionInput.value = '';
    resetOptionsForm();
    showToast('✅ Đã tạo poll thành công!');
    await loadPolls(true, false);
  }
  
  function resetOptionsForm() {
    optionsContainer.innerHTML = `
      <div class="options-input">
        <input type="text" class="option-input" placeholder="Lựa chọn 1">
        <input type="text" class="option-input" placeholder="Lựa chọn 2">
      </div>
    `;
  }
  
  function addOption() {
    const optionsCount = document.querySelectorAll('.option-input').length;
    if (optionsCount >= 10) {
      showToast('Tối đa 10 lựa chọn', true);
      return;
    }
    
    const newDiv = document.createElement('div');
    newDiv.className = 'options-input';
    newDiv.innerHTML = `
      <input type="text" class="option-input" placeholder="Lựa chọn ${optionsCount + 1}">
      <button type="button" class="remove-option" style="background:#ef4444; width:auto; padding:10px">
        <i class="fas fa-times"></i>
      </button>
    `;
    
    optionsContainer.appendChild(newDiv);
    
    newDiv.querySelector('.remove-option').addEventListener('click', () => {
      if (document.querySelectorAll('.option-input').length > 2) {
        newDiv.remove();
      } else {
        showToast('Phải có ít nhất 2 lựa chọn', true);
      }
    });
  }
  
  function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
      silentRefresh();
    }, 30000);
    console.log('✅ Auto refresh đã khởi động (30s)');
  }
  
  function stopAutoRefresh() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
  // Realtime
  function setupRealtime() {
    const channel = _supabase
      .channel('polls-realtime')
      .on('postgres_changes', 
        { event: '*', schema: 'public', table: 'polls' },
        async () => {
          console.log('🔄 Poll thay đổi');
          await loadPolls(true, false);
        }
      )
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'votes' },
        async () => {
          console.log('🔄 Có vote mới');
          await loadPolls(true, false);
        }
      )
      .subscribe();
    return channel;
  }
  
  // Event listeners
  createBtn.addEventListener('click', createPoll);
  addOptionBtn.addEventListener('click', addOption);
  refreshBtn.addEventListener('click', () => loadPolls(true, true));
  
  // Initialize
  async function init() {
    await loadPolls(true, false);
    setupRealtime();
    startAutoRefresh();
  }
  
  window.addEventListener('beforeunload', () => {
    stopAutoRefresh();
  });
  
  init();
})();
</script>
</body>
</html>
